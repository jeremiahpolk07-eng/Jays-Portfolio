name: Notify Vercel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  notify-vercel:
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - name: 'notify vercel'
        uses: 'vercel/repository-dispatch/actions/status@v1'
        with:
          name: 'Vercel - jays-portfolio: SZN Stacks'